<!DOCTYPE HTML> 
<html> 
<head>
    <link rel="stylesheet" href="https://unpkg.com/tachyons@4.10.0/css/tachyons.min.css"/>
    <link href="https://fonts.googleapis.com/css?family=Roboto&display=swap" rel="stylesheet">
    <link rel = "stylesheet" type = "text/css" href = "animate.css" />
    <style>
        body {
            font-family: 'Roboto', sans-serif;
        }
        #clockdiv{ 
            font-family: sans-serif; 
            color: #fff; 
            display: inline-block; 
            font-weight: 100; 
            text-align: center; 
            font-size: 30px; 
        } 
        #clockdiv > div{ 
            display: inline-block; 
        } 
        #clockdiv div > span{
            display: inline-block; 
        }
        #myVideo {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
          }
          
          
          
          /* Style the button used to pause/play the video */
          #myBtn {
            width: 200px;
            font-size: 18px;
            padding: 10px;
            border: none;
            background: #000;
            color: #fff;
            cursor: pointer;
          }
          
          #myBtn:hover {
            background: #ddd;
            color: black;
          }
    </style>
</head> 
<body class="bg-navy white">
    <div class="cf w-100">
        <img src="whitelogo.png" class="animated infinite bounce delay-5s center db h5 mt3" >
        <div class="pt3 pv0 fw6 tc" style="font-size: 100px;">New Year Countdown</div> 
        <div class="cf center mw9"> 
            <div class="fl w-100" id="clockdiv">  
                <div class="fl w-third pa3">
                    <article class="mw8 center bg-washed-yellow navy br3 pa3 mv3 ba b--black-10">
                        <div class="tc">
                            <span class="fw6 mb2" style="font-size: 300px;" id="hour"></span> 
                            <div class="fw6" style="font-size: 100px;">Hours</div> 
                        </div>
                    </article>
                </div> 
                <div class="fl w-third pa3">
                    <article class="mw8 center bg-washed-yellow navy br3 pa3 mv3 ba b--black-10">
                        <div class="tc">
                            <span class="fw6 mb2" style="font-size: 300px;" id="minute"></span> 
                            <div class="fw6" style="font-size: 100px;">Minutes</div> 
                        </div>
                    </article>
                </div> 
                <div class="fl w-third pa3">
                    <article class="mw8 center bg-washed-yellow navy br3 pa3 mv3 ba b--black-10">
                        <div class="tc">
                            <span class="fw6 mb2" style="font-size: 300px;" id="second"></span> 
                            <div class="fw6" style="font-size: 100px;">Seconds</div> 
                        </div>
                    </article>
                </div> 
            </div> 
        </div> 
        
        <p class="fw6 tc f1" id="demo"></p> 
    </div>

    <div class="dn">
        <video autoplay muted loop id="myVideo">
            <source src="firework.mp4" type="video/mp4">
        </video>
      
      <!-- Optional: some overlay text to describe the video -->
        <div class="dtc v-mid tc white ph3 ph4-l">
            <img src="whitelogo.png" class="animated infinite bounce delay-5s center db h5" >
            <h1 class="fw6 tc" style="font-size: 180px;">Happy New Year</h1>
        </div>
    </div>
        
    <article class="vh-100 dn  w-100 bg-dark-pink">
        <div class="dtc v-mid tc white ph3 ph4-l">
            <img src="whitelogo.png" class="animated infinite bounce delay-5s center db h5" >
            <h1 class="fw6 db tc" style="font-size: 180px;">Happy New Year</h1>
        </div>
    </article>
  
<script> 
  
var deadline = new Date("dec 31, 2019 23:59:59").getTime(); 
  
var x = setInterval(function() { 
  
var now = new Date().getTime(); 
var t = deadline - now; 
var hours = Math.floor((t%(1000 * 60 * 60 * 24))/(1000 * 60 * 60)); 
var minutes = Math.floor((t % (1000 * 60 * 60)) / (1000 * 60)); 
var seconds = Math.floor((t % (1000 * 60)) / 1000); 
document.getElementById("hour").innerHTML =hours; 
document.getElementById("minute").innerHTML = minutes;  
document.getElementById("second").innerHTML =seconds;  
if (t < 0) { 
        clearInterval(x); 
        document.getElementById("demo").innerHTML = "HAPPY NEW YEAR TO ALL CELESTIANS ALL OVER THE WORLD"; 
        document.getElementById("hour").innerHTML ='0'; 
        document.getElementById("minute").innerHTML ='0' ;  
        document.getElementById("second").innerHTML = '0'; } 
}, 1000); 
</script> 
</body> 
</html>
